services:
  vaultlock-api:
    build:
      context: .
      dockerfile: Dockerfile.dev
      network: host
    image: vaultlock-backend:dev
    container_name: vaultlock-api-dev
    restart: unless-stopped
    network_mode: "host"
    volumes:
      - ./src:/app/src:ro
      - ./dev-data/db:/data/db
      - ./tsconfig.json:/app/tsconfig.json:ro
      - ./.env:/app/.env:ro
    environment:
      - NODE_ENV=development
      - PORT=3000
      - DB_PATH=/data/db/vaultlock.db
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '1.0'
