services:
  vaultlock-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: vaultlock-backend:latest
    container_name: vaultlock-api
    restart: unless-stopped
    ports:
      - "3443:3443"
    volumes:
      - vaultlock-db:/data/db
      - vaultlock-certs:/data/certs
      - ./.env:/app/.env:ro
    environment:
      - NODE_ENV=production
      - PORT=3443
      - DB_PATH=/data/db/vaultlock.db
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: '0.5'
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3443/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  vaultlock-db:
    driver: local
  vaultlock-certs:
    driver: local
