services:
  vaultlock-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: vaultlock-backend-dev
    ports:
      - "3000:3000"
    volumes:
      - ./backend/src:/app/src
      - ./backend/data:/data
    environment:
      - NODE_ENV=development
      - PORT=3000
      - DB_PATH=/data/vaultlock.db
      - JWT_SECRET=dev-jwt-secret-not-for-production
      - JWT_EXPIRES_IN=15m
      - REFRESH_TOKEN_EXPIRES_IN_MS=604800000
      - CORS_ORIGIN=http://localhost:5173
      - ARGON2_MEMORY=65536
      - ARGON2_ITERATIONS=3
      - ARGON2_PARALLELISM=4
      - RATE_LIMIT_AUTH=5
      - RATE_LIMIT_AUTH_WINDOW=900000
      - RATE_LIMIT_VAULT=30
      - RATE_LIMIT_VAULT_WINDOW=60000
      - RATE_LIMIT_DEFAULT=100
      - RATE_LIMIT_DEFAULT_WINDOW=60000
      - TOTP_ENABLED=true
      - CSRF_SECRET=dev-csrf-secret
